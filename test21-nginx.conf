events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;

        # Original block
        location /proxy/ {
            resolver 8.8.8.8;
            set $target_url "";
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            proxy_pass $target_url;
            proxy_ssl_server_name on;
        }
    }
}
