events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;

        # When proxying, we need the EXACT raw URL.
        # But if we use $request_uri and it extracts `https://domain.com/path`, proxy_pass variables that CONTAIN a URI MUST HAVE THE URI PART correctly replaced.
        # Wait, if `proxy_pass $target_url;` where $target_url = "https://stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4" sends `GET /proxy/https...`, it means Nginx didn't recognize it as containing a URI?
        # Nginx parses the variable `$target_url` during proxy_pass.
        # If it doesn't see a URI, it appends `$request_uri` (which is `/proxy/https...`).
        # WHY WOULDN'T IT SEE A URI?
        # Maybe because `https://` is parsed, host is `stream.team-ei.de`, URI is `/movie/...`. IT DOES SEE A URI!
        # Ah. "If a URI is specified in proxy_pass, it replaces the original request URI... However, if variables are used in proxy_pass and the URI is NOT SPECIFIED, it is passed in the same form as sent by a client."
        # WAIT! "If a URI is specified in proxy_pass" means IN THE CONFIGURATION FILE! Not inside the variable!
        # `proxy_pass $target_url;` -> This is a variable ONLY. There is NO URI specified in the configuration file!
        # Therefore, Nginx passes the request URI (`/proxy/https...`) to the upstream server!

        # YES! That's exactly how Nginx works!
        # "In this case, if URI is specified in the directive, it replaces the original URI..."
        # But we only wrote `proxy_pass $target_url;`. There's NO URI specified in the directive itself.
        # To make Nginx NOT append the original request URI, we MUST rewrite the URI before proxy_pass!
    }
}
