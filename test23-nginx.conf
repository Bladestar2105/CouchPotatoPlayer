events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;

        # Test rewriting properly
        location /proxy/ {
            resolver 8.8.8.8;
            set $target_url "";
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            # Wait! Why does Nginx send "/proxy/https:/..." when proxy_pass is a full URL?
            # It's because NGINX documentation says:
            # "If a URI is specified in proxy_pass... However, if variables are used in proxy_pass, it replaces the original request URI... EXCEPT if it cannot determine the URI... THEN it passes the request URI in the same form as sent by a client."
            # "Cannot determine the URI" means the variable does not contain a URI!
            # Does `https://stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4` contain a URI? YES! `/movie...`
            # Then why does it pass the original request URI?
            # AH! The NGINX memory note says:
            # "Because Nginx extracts the raw target URL directly from $request_uri to avoid proxy_pass encoding errors.
            # However, when proxy_pass is a variable, NGINX parses the variable into scheme, host, port, URI.
            # If the parsing succeeds, it uses it.
            # But wait, why did test15 use the exact right URI?
            # In test15 we explicitly did: rewrite ^ $target_uri break; proxy_pass $target_url;
            # And it sent `"/movie/yoshisan/Ss21051988/1.mp4?"`. And we STILL got 502!
        }
    }
}
