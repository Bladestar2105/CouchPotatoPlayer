events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;

        # Original block from nginx.conf that fails for binary segments
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8 8.8.4.4 valid=300s;
            resolver_timeout 5s;

            set $target_url "";
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            if ($target_url = "") { return 400 "Missing target URL"; }

            # Since $request_uri is raw, it should have `https://`
            # Wait! The memory says: "Nginx extracts the raw target URL directly from $request_uri to avoid proxy_pass encoding errors."
            # BUT the regex `^/proxy/(.*)$` extracts the REST.
            # In Nginx proxy_pass, if a variable doesn't have a scheme, it appends the current URI!
            # Did Nginx think `$target_url` lacked a scheme?
            # NO, Nginx's proxy_pass requires `http://` or `https://` at the VERY START of the variable, OR hardcoded.
            # If $target_url starts with `https://`, why would it fail?
            # Wait, `https:/stream` only has ONE slash?
            # If a client sends `GET /proxy/https://stream...`, $request_uri DOES contain double slashes!

            # Oh wait, `curl -I "http://localhost:80/proxy/https://stream.team-ei.de/test"`
            # DOES send double slashes!

            # Wait, look at Nginx logs from test39!
            # `http upstream request: "/proxy/https:/stream.team-ei.de/test?"`
            # NGINX thinks the PATH is `/proxy/https:/stream...`
            # This means Nginx is using the ORIGINAL $uri as the path for the upstream!
            # WHY? Because proxy_pass variable doesn't have a path, or because proxy_pass variable is NOT evaluated properly!

        }
    }
}
