events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;

        # Test rewriting the exact config in the regex block from test2
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8 8.8.4.4 valid=300s;
            resolver_timeout 5s;

            # Since $target_url has the URI, let's look at the variable again.
            # "https://stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4"
            # And Nginx sends "/proxy/https:/stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4?"

            # Wait, `https://stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4` has NO `https:/stream` in it, it has `https://stream`!
            # If Nginx logs it as `https:/stream`, where did the double slash go?
            # It went away because $request_uri is NOT raw!
            # WAIT! Is $request_uri raw or not?
            # YES, $request_uri is raw. BUT NGINX `proxy_pass` uses `$uri` if the variable doesn't contain a URI!
            # Since the variable IS the URL, Nginx should use the URI inside it.
            # "If the variable is evaluated to just a domain name or IP address... "
            # Wait, if `proxy_pass $target_url;` where `$target_url` is `https://stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4`, why does Nginx use the original URI?
            # Because Nginx thinks `$target_url` does NOT contain a URI!
            # WHY?! Because the variable contains `https://stream.team-ei.de...`
            # Ah! `proxy_pass` ONLY parses variables if it's evaluated as a FULL URL!
            # Does `https://stream.team-ei.de/...` count as a full URL? Yes!
            # But the documentation says: "In this case, if URI is specified in the directive, it is passed to the server as is, replacing the original request URI."
            # The URI is NOT specified in the directive! `proxy_pass $target_url;` has NO URI specified in the directive!
            # "If URI is NOT specified in the directive, the request URI is passed in the same form as sent by a client..."
            # WHICH MEANS: proxy_pass ignores the URI inside `$target_url` and appends the client's URI (`/proxy/https...`) to the domain inside `$target_url`!

            # SO `proxy_pass $target_url` sends:
            # Domain: `stream.team-ei.de`
            # URI: `/proxy/https://stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4`
            # That's exactly what `"/proxy/https:/stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4?"` is!
            # Nginx collapses the slashes in the path when making the upstream request!

            # YES! THAT'S IT! NGINX ignores the path inside `$target_url` because `proxy_pass` has no path in the directive!
            # To fix it, we MUST rewrite the URI before proxy_pass!
        }
    }
}
