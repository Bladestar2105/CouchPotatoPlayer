server {
    listen 80;
    server_name _;

    # Determine allowed CORS origin
    set $cors_origin "";
    if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$") {
        set $cors_origin $http_origin;
    }
    if ($http_origin ~* "^https?://$http_host$") {
        set $cors_origin $http_origin;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Serve the React application
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to bypass CORS
    # The request URL must be appended to /proxy/
    # Example: /proxy/https://stream.team-ei.de/player_api.php?...
    # Handle media segments separately to disable sub_filter
    # This is crucial because many IPTV providers serve .ts/.mp4 chunks with "Content-Type: text/plain",
    # which would otherwise trigger sub_filter and corrupt the binary video stream.
    location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
        # Only allow GET and OPTIONS for our proxy
        limit_except GET OPTIONS {
            deny all;
        }

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Extract the target URL from the request URI
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        set $target_url "";
        if ($request_uri ~* "^/proxy/(https?://([^/?]+)(.*))$") {
            set $target_url $1;
            set $target_host $2;
            set $target_path $3;
        }

        if ($target_url = "") {
            return 400 "Missing target URL";
        }

        if ($target_path = "") {
            set $target_path "/";
        }
        if ($target_path ~* "^(\?.*)$") {
            set $target_path "/$1";
        }

        # Rewrite URI to ensure proxy_pass with a variable doesn't append original URI
        rewrite ^ $target_path break;

        # Explicitly set Host and SNI to prevent 502 Bad Gateway
        proxy_set_header Host $target_host;
        proxy_ssl_name $target_host;

        proxy_pass $target_url;
        proxy_ssl_server_name on;

        # Use HTTP/1.1 for keep-alive and chunked transfer support
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Prevent upstream from gzipping the response, so native players decode successfully
        proxy_set_header Accept-Encoding "";

        # Disable proxy buffering for live media streams to prevent disk buffering and latency
        proxy_buffering off;

        # Pass important headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Add CORS headers to the response
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Vary' 'Origin' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }

    location /proxy/ {
        # Only allow GET and OPTIONS for our proxy
        limit_except GET OPTIONS {
            deny all;
        }

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Extract the target URL from the request URI
        # We need a resolver for DNS lookups
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Extract target URL from $request_uri so it is not decoded/mangled by Nginx
        set $target_url "";
        if ($request_uri ~* "^/proxy/(https?://([^/?]+)(.*))$") {
            set $target_url $1;
            set $target_host $2;
            set $target_path $3;
        }

        # If no URL is provided, return 400
        if ($target_url = "") {
            return 400 "Missing target URL";
        }

        if ($target_path = "") {
            set $target_path "/";
        }
        if ($target_path ~* "^(\?.*)$") {
            set $target_path "/$1";
        }

        # Extract the target origin for sub_filter rewriting
        set $target_origin "";
        if ($target_url ~* "^(https?://[^/]+)") {
            set $target_origin $1;
        }

        # Rewrite URI to ensure proxy_pass with a variable doesn't append original URI
        rewrite ^ $target_path break;

        # Explicitly set Host and SNI to prevent 502 Bad Gateway
        proxy_set_header Host $target_host;
        proxy_ssl_name $target_host;

        # NGINX needs proxy_pass to know where to go.
        proxy_pass $target_url;
        proxy_ssl_server_name on;

        # Use HTTP/1.1 for keep-alive and chunked transfer support
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Prevent upstream from gzipping the response, so sub_filter can read it
        proxy_set_header Accept-Encoding "";

        # Disable proxy buffering for live media streams to prevent disk buffering and latency
        proxy_buffering off;

        # Rewrite absolute root-relative paths in M3U8 playlists back to the proxy
        sub_filter_types application/vnd.apple.mpegurl application/x-mpegurl audio/mpegurl text/plain;
        sub_filter '/live/' '/proxy/$target_origin/live/';
        sub_filter '/movie/' '/proxy/$target_origin/movie/';
        sub_filter '/series/' '/proxy/$target_origin/series/';
        sub_filter '/hls/' '/proxy/$target_origin/hls/';
        # Xtream codes sometimes uses /hls/ or /live/segment/ which are captured by the above.
        sub_filter_once off;

        # Pass important headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # We don't send the Host header of our server, we let it be the target URL's host

        # Add CORS headers to the response
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Vary' 'Origin' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }
}
