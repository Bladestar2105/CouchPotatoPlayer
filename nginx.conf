server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the React application
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to bypass CORS
    # The request URL must be appended to /proxy/
    # Example: /proxy/https://stream.team-ei.de/player_api.php?...
    location /proxy/ {
        # Only allow GET and OPTIONS for our proxy
        limit_except GET OPTIONS {
            deny all;
        }

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Extract the target URL from the request URI
        # We need a resolver for DNS lookups
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Extract target URL from $request_uri so it is not decoded/mangled by Nginx
        set $target_url "";
        if ($request_uri ~* "^/proxy/(.*)$") {
            set $target_url $1;
        }

        # If no URL is provided, return 400
        if ($target_url = "") {
            return 400 "Missing target URL";
        }

        # NGINX needs proxy_pass to know where to go.
        # Since proxy_pass with a variable doesn't append query args automatically
        # we have to pass the exact URI.
        proxy_pass $target_url;
        proxy_ssl_server_name on;

        # Pass important headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # We don't send the Host header of our server, we let it be the target URL's host

        # Add CORS headers to the response
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }
}
