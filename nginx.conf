server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files for the React application
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Custom Proxy for IPTV requests
    # Capture everything after /proxy/ exactly as it was requested
    location /proxy/ {
        # Use Docker's internal DNS resolver and fallback to Google DNS
        resolver 127.0.0.11 8.8.8.8 ipv6=off;

        # Extract the target URL from the raw $request_uri to prevent Nginx from merging
        # the double slashes in http:// or https:// (which happens in the normalized $uri)
        set $target_url "";
        if ($request_uri ~ ^/proxy/(.*)$) {
            set $target_url $1;
        }

        # Ensure the target URL is provided and starts with http(s)
        if ($target_url = "") {
            return 400 "Missing target URL";
        }
        if ($target_url !~ ^https?://) {
            return 400 "Invalid URL scheme";
        }

        # CORS whitelist check
        set $cors_origin "";
        if ($http_origin ~* (https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$)) {
            set $cors_origin $http_origin;
        }

        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Proxy the request
        proxy_pass $target_url;
        proxy_set_header Host $proxy_host;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Hide existing CORS headers from the target server
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # Add our own CORS headers
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    }
}
