events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8;
            set $target_url "";
            set $target_origin "";

            # The issue in test15 was STILL 502 with the CORRECT URI.
            # Why 502 with correct URI?
            # 2026/03/10 21:43:53 [debug] 4988#4988: *1 http upstream request: "/movie/yoshisan/Ss21051988/1.mp4?"
            # SSL_get_error: 6 (which is SSL_ERROR_ZERO_RETURN, i.e. the peer closed the connection abruptly!)
            # Why would the peer close the connection abruptly?
            # BECAUSE we didn't send SNI!
            # The NGINX memory note says:
            # "The local Nginx proxy used for bypassing CORS must have proxy_ssl_server_name on; configured in nginx.conf. This is necessary because using a variable in proxy_pass prevents Nginx from automatically sending the Server Name Indication (SNI), which otherwise results in 502 Bad Gateway / SSL handshake internal errors (alert 80) with upstream HTTPS IPTV providers."

            # Did we have proxy_ssl_server_name on;? YES.
            # BUT wait, the SNI name sent is extracted from the variable if possible, OR if we specify `proxy_ssl_name`.
            # If the proxy_pass variable is `https://stream.team-ei.de/movie...`, Nginx extract SNI correctly?
            # Let's check `upstream SSL server name:` in the logs!
            # In error.log: `upstream SSL server name: "stream.team-ei.de"`
            # SO SNI is correct!

            # Why did the upstream server close the connection then?
            # Let's check test13! test13 we added `proxy_set_header Host $upstream_host;`. Still 502!
            # What if we need to remove the port from the Host header?
            # What if the upstream server is blocking User-Agent?
        }
    }
}
