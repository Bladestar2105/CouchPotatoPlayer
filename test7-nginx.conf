events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8;
            set $target_url "";
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            # We must not use a variable containing scheme://domain without trailing slash
            # or with path inside proxy_pass if we don't handle URI properly.
            # Actually, the nginx memory says:
            # "Both frontend API requests and direct media stream playback URLs (e.g., in getLiveStreamUrl) must append the target URL directly to the proxy path (e.g., /proxy/${url}) instead of using a URL-encoded query parameter, because Nginx extracts the raw target URL directly from $request_uri to avoid proxy_pass encoding errors."
            # and
            # "In nginx.conf, the sub_filter directive does not accept an 'off' argument and requires exactly two arguments. To prevent binary video stream corruption (e.g., .ts, .mp4) without causing syntax errors, rely on Nginx's lack of inheritance between sibling location blocks rather than explicitly disabling it. Isolating media segments into their own regex location block ensures sub_filter from the sibling /proxy/ block is naturally not applied."

            # Since $target_url contains the whole URL "https://stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4"
            # And we use proxy_pass $target_url;
            # Wait, Nginx documentation for proxy_pass:
            # "If the proxy_pass directive is specified with a URI, then when a request is passed to the server, the part of a normalized request URI matching the location is replaced by a URI specified in the directive..."
            # "In some cases, the part of a request URI to be replaced cannot be determined... When variables are used in proxy_pass... In this case, if URI is specified in the directive, it is passed to the server as is, replacing the original request URI."

            # Since $target_url has "https://stream.team-ei.de/movie/..." it IS specified with URI. So the request to upstream will use the URI part of $target_url.
            # BUT wait, the regex location block doesn't allow proxy_pass to have a URI part UNLESS using a variable. Since we are using a variable, it's fine.
            # The issue in test5: http upstream request: "/proxy/https:/stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4?"
            # Where did "/proxy/https:" come from?
            # It comes from $request_uri if we do `proxy_pass $target_url;` where $target_url is JUST the domain, or if $target_url is not recognized as a full URL by proxy_pass because it's missing the scheme?
            # Ah! `https://`
        }
    }
}
