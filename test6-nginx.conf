events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8;
            set $target_url "";
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            # When using variables in proxy_pass, if the URI is part of the variable
            # but you didn't define a trailing slash or path, nginx might send the original
            # request_uri. Let's see if we rewrite it.
            rewrite ^/proxy/(.*)$ /$1 break;
            proxy_pass $target_url;
            proxy_ssl_server_name on;
        }
    }
}
