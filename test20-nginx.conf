events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8;
            set $target_url "";
            set $target_origin "";

            # The issue in test19 was the rewrite rule wasn't matching maybe?
            # Or because $request_uri is raw, but `rewrite` runs on $uri which has decoded characters or collapsed slashes!
            # Let's check what Nginx is actually matching on rewrite.
            # $uri for "/proxy/https://stream.team-ei.de" is actually "/proxy/https:/stream.team-ei.de" because consecutive slashes are collapsed!

            # Since slashes are collapsed, we must extract everything from $request_uri manually.
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            # The only way to bypass Nginx's automatic URL modification in proxy_pass is to pass the variable unchanged?
            # BUT we saw it passed "/proxy/https:/..." because $target_url was considered without a URI maybe?
            # Wait! If proxy_pass variable contains a full URL, it SHOULD replace the URI. But wait, `https:/stream.team-ei.de`!
            # Since slashes are collapsed in $uri, did Nginx rewrite it? No!
            # The memory: "Nginx extracts the raw target URL directly from $request_uri to avoid proxy_pass encoding errors"
            # It extracts from $request_uri, so $target_url IS "https://stream.team-ei.de/..."

            # Why did Nginx use "/proxy/https:/..."?
            # Could it be because the regex location block doesn't allow proxy_pass URI, and variables in proxy_pass somehow fail to replace the URI?
            # Let's try isolating the proxy_pass to a non-regex location!
        }
    }
}
