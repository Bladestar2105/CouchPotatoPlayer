events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8;
            set $target_url "";
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            # Rewrite the URI first so nginx sends the correct URI to upstream
            # Because proxy_pass with variable will replace the original URI with the URI part of the variable.
            # But maybe the scheme is missing? The variable is literally "https://stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4"
            # In Nginx, if proxy_pass variable doesn't have a URI, it uses the original request URI (which is /proxy/https://...)
            # WAIT. Does "https://domain.com/path" count as having a URI? Yes, "/path".
            # Let's try to explicitly rewrite before proxy_pass
            rewrite ^/proxy/https?://[^/]+(/.*)$ $1 break;

            proxy_pass $target_url;
            proxy_ssl_server_name on;
        }
    }
}
