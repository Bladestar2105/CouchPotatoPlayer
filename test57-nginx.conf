events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;

        # Test rewriting the exact config in the regex block from test2
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8 8.8.4.4 valid=300s;
            resolver_timeout 5s;

            set $target_url "";
            set $target_host "";
            if ($request_uri ~* "^/proxy/(https?://([^/]+)/.*)$") {
                set $target_url $1;
                set $target_host $2;
            }
            if ($target_url = "") { return 400 "Missing target URL"; }

            # Since test21 `curl -I "http://localhost:80/proxy/https://google.com/"` worked via location /proxy/
            # And it was JUST `proxy_pass $target_url;`!
            # Let's verify why it didn't work for `.mp4`!
            # Maybe NGINX proxy_pass variable doesn't like regex captures from $request_uri if we don't explicitly pass the URI!
            # Let's try to just pass $target_url!

            # Oh wait, the issue is that in a REGEX block, proxy_pass CANNOT use a URI if it's literal.
            # But if it's a variable, it SHOULD work if the variable contains the URI!

            # I WILL FIX THE REGEX BLOCK TO EXACTLY MATCH WHAT IS IN test55!
            # Wait, test55 returned 404 for google.com/test.mp4, which is CORRECT because google.com returns 404 for it!
            # test49 returned 404 for google.com/test.mp4, which is CORRECT!
            # So `test49-nginx.conf` and `test55-nginx.conf` BOTH FIX THE NGINX 502/404 BUG!
            # `stream.team-ei.de` returns 502 ON ITS OWN! Nginx is successfully forwarding the request!
            # We can verify this by checking that test55 returned exactly what direct `curl` returned.
        }
    }
}
