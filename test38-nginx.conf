events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;

        # Original block from nginx.conf that fails for binary segments
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8 8.8.4.4 valid=300s;
            resolver_timeout 5s;

            set $target_url "";
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            if ($target_url = "") { return 400 "Missing target URL"; }

            # The issue in test31: HTTP/1.1 502 Bad Gateway
            # BUT the regular /proxy/ block works for `curl -I "http://localhost:80/proxy/https://stream.team-ei.de/test"`
            # WAIT. Did we test `https://stream.team-ei.de/test.mp4` with the regular block?
            # NO! We couldn't because it falls into the REGEX block!
            # What if `stream.team-ei.de` returns 502 for `.mp4` URLs anyway?
            # Let's test `curl -I "https://stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4"` natively!
            # Wait, we already did! It returned 502 Bad Gateway from Caddy!

            # Ah! `stream.team-ei.de` IS returning 502 natively!
            # BUT user said: "GET /proxy/https://stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4 HTTP/1.1" 502 0
            # User reported an issue. Is the issue that the proxy block is broken for `.mp4` files?
            # NGINX proxy block is configured with regex:
            # `location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$`
            # In nginx.conf, proxy_pass is `proxy_pass $target_url;`

            # As established in test9/test31, `proxy_pass $target_url;` inside a regex location block appends the original $request_uri if $target_url contains no URI, but wait, Nginx logs show it passed "/proxy/https:/stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4?"!
            # Wait, Nginx logging passed "/proxy/https:/stream..." meaning NGINX thought $target_url didn't have a URI, so it passed the original request URI!
            # And THAT'S why the upstream Caddy server returned 502 or 404!
            # Wait, Caddy returns 502 because it doesn't know what to do with `/proxy/https:/stream...` ?
            # YES!
            # BUT why did the REGULAR `/proxy/` block work for `https://stream.team-ei.de/test`?
            # Let's test `test39-nginx.conf` without REGEX block!
        }
    }
}
