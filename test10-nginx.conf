events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8;
            set $target_url "";
            set $target_host "";
            set $target_path "";

            # Extract the actual URL and separate host vs path so we can pass it to proxy_pass without URI issues
            if ($request_uri ~* "^/proxy/(https?://([^/]+)(/.*)?)$") {
                set $target_url $1;
                set $target_host $2;
                set $target_path $3;
            }

            # Here's the trick. If we define proxy_pass as:
            # proxy_pass $target_url;
            # Since $target_url is a variable containing a URI, it should replace the request URI.
            # But the documentation also says: "If proxy_pass is specified without a URI, the request URI is passed to the server in the same form as sent by a client when processing an original request..."
            # Wait, if we rewrite the URI first:
            rewrite ^/proxy/(https?://[^/]+)(/.*)?$ $2 break;
            proxy_pass $1;
            proxy_ssl_server_name on;
        }
    }
}
