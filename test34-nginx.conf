events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;

        # Test rewriting the exact config in the regex block from test2
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8 8.8.4.4 valid=300s;
            resolver_timeout 5s;

            set $target_url "";
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            if ($target_url = "") { return 400 "Missing target URL"; }

            # Since $target_url contains the FULL URL including URI, and proxy_pass $target_url
            # doesn't replace the URI because it's just a variable without URI specified IN THE CONFIG,
            # we need to rewrite the URI explicitly.
            # But what should the URI be? It should be the path part of $target_url.
            # We can extract the path from $request_uri:
            set $target_path "";
            if ($request_uri ~* "^/proxy/https?://[^/]+(/.*)?$") {
                set $target_path $1;
            }
            # If $target_path is empty, use /
            if ($target_path = "") {
                set $target_path "/";
            }

            # Rewrite URI to $target_path
            rewrite ^ $target_path break;

            proxy_pass $target_url;
            proxy_ssl_server_name on;
        }
    }
}
