events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8;
            set $target_url "";
            set $upstream_host "";
            if ($request_uri ~* "^/proxy/(https?://([^/]+)/.*)$") {
                set $target_url $1;
                set $upstream_host $2;
            }
            # Wait! If Nginx handles $request_uri by collapsing multiple slashes,
            # $request_uri is NOT collapsed. BUT Nginx doesn't like passing URI inside a variable for proxy_pass if you are in a regex location, wait no, it allows variables.
            # Look at this stackoverflow answer:
            # "When proxy_pass is defined with ONLY a variable (e.g., `proxy_pass $target`), and the variable contains a complete URL (e.g. `http://backend/path`), nginx replaces the entire request URI with the one from the variable."
            # Wait! Let's check nginx logs again. Why does it send "/proxy/https:/stream..."?
            # It's treating $target_url as a DOMAIN? No, because there's a port? No.
            # Ah! If proxy_pass sees a variable, it parses it:
            # If the variable doesn't have a recognizable URI, it appends the original $uri !
            # "https://domain.com/path" -> URI is "/path".
            # Why would it think the URI is missing?
            # Is it because we are using a regex location?
            # Or is it because `proxy_pass` needs the URI to be separated?

            # What if we use `rewrite` to strip the prefix and then `proxy_pass $target_domain`?
        }
    }
}
