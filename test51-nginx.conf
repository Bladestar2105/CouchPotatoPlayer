events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;

        # OKAY, I HAVE FIGURED IT OUT!
        # When `proxy_pass $target_url;` is inside a `location /proxy/ {}` (NON-REGEX), Nginx parses the variable `$target_url` BUT for some magical reason, it works.
        # Wait, DID IT WORK for the non-regex block in test39? Let me look at test39!
        # "http upstream request: "/proxy/https:/stream.team-ei.de/test?""
        # NO, IT SENT THE EXACT SAME BAD URI IN TEST 39!
        # So WHY did test2 (which wrapped original nginx.conf) succeed for google.com?
        # `curl -I "http://localhost:80/proxy/https://google.com/"` -> 301 Moved Permanently!
        # It sent `/proxy/https:/google.com/` to google.com, and Google returned 301!

        # That means BOTH `location /proxy/` and `location ~* ^/proxy/.*\.(ts|...)$` have the EXACT SAME BUG!
        # `proxy_pass $target_url;` without URI rewrites passes the WRONG URI (`/proxy/https:/...`) to the upstream server!

        # TO FIX IT, we just need to fix `proxy_pass` to NOT send the `/proxy/...` prefix in BOTH location blocks!
        # However, the user specifically reported the issue for the .mp4 block because stream.team-ei.de returns 502 Bad Gateway for `/proxy/...` URIs, which breaks playback!

        # Wait, if we just fix the URI, does `stream.team-ei.de/movie/...` still return 502?
        # Yes, test47 proved that even `curl -I https://stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4` directly returns 502!
        # But wait, why did the user say "502"? Because the user's NGINX returned 502 because it forwarded `/proxy/...` which caused the upstream server to return 502/404!
        # So we MUST fix the URI being forwarded!

        # How do we fix the URI being forwarded correctly in BOTH blocks?
        # In test49, we did:
        # if ($request_uri ~* "^/proxy/(https?://([^/]+))(.*)$") {
        #     set $target_url $1;
        #     set $target_host $2;
        #     set $target_path $3;
        # }
        # rewrite ^ $target_path break;
        # proxy_pass $target_url;
        # And it sent `"/test.mp4?"` to google.com! WHICH IS PERFECT!

        # Is there a simpler way?
        # What if we just do:
        # proxy_pass $target_url;
        # BUT since `$target_url` already contains the full URL `https://google.com/test.mp4`,
        # if we just do `rewrite ^/proxy/(.*)$ /$1 break;` it doesn't help because `proxy_pass` variable ignores Nginx's URI if it can parse it?
        # Actually, Nginx docs say: "When variables are used in proxy_pass... if URI is specified in the directive, it replaces the original URI."
        # What if we add a slash? `proxy_pass $target_url/`? No, `$target_url` already has a slash.
    }
}
