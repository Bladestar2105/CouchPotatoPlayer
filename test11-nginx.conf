events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8;
            set $target_url "";
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            # Instead of passing the whole URL to proxy_pass via variable (which appends the original URI somehow?),
            # Actually, NGINX memory: "Since proxy_pass with a variable doesn't append query args automatically we have to pass the exact URI."
            # Wait, the problem is that proxy_pass $target_url does pass it, but maybe it's missing something?
            # Wait, if we use a regex location block, proxy_pass CANNOT have a URI part in it UNLESS it's a variable.
            # And we ARE using a variable.
            # BUT the debug log showed: http upstream request: "/proxy/https:/stream.team-ei.de/movie/yoshisan/Ss21051988/1.mp4?"
            # This means Nginx sent `GET /proxy/https:/stream...` to the upstream server!
            # The upstream server is Caddy, and it returned 502 Bad Gateway because it doesn't know what to do with that or it tried to fetch it and failed.

            # Why did Nginx send `/proxy/...`? Because when proxy_pass is a variable containing a full URL `https://domain.com/path`,
            # "When variables are used in proxy_pass: In this case, if URI is specified in the directive, it is passed to the server as is, replacing the original request URI."
            # The URI part of $target_url is `/movie/yoshisan/...`. Wait, NO!

            # Let's test rewriting the URI explicitly so that the $uri Nginx uses is empty or just the path, but wait,
            # proxy_pass $target_url; is passing it exactly.

        }
    }
}
