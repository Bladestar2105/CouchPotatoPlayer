events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8;
            set $target_url "";
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            # Look at proxy_pass in nginx documentation:
            # "If a URI is specified in proxy_pass... Since 1.1.12, if variables are used in proxy_pass, it replaces the original request URI."
            proxy_pass $target_url;
            proxy_ssl_server_name on;
        }
    }
}
