events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;
        location ~* ^/proxy/.*\.(ts|mp4|mkv|m4s|mp4a|mp4v)(\?.*)?$ {
            resolver 8.8.8.8;
            set $target_url "";
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            # We must specify proxy_pass carefully
            # The original code has: proxy_pass $target_url;
            # Let's inspect $target_url
            add_header X-Target-Url $target_url always;
            return 200 "Target: $target_url\n";
        }
    }
}
