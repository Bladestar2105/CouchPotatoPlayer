name: Build Apps

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── Android Build (React Native Expo) ────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Dependencies
        run: pnpm install
      - name: Prebuild Android
        run: npx expo prebuild --platform android
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

  # ── iOS Build (React Native Expo) ────────────────────────────────────────
  build-ios:
    runs-on: macos-15
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install
      - name: Prebuild iOS
        run: npx expo prebuild --platform ios
      - name: Pod Install
        run: |
          cd ios
<<<<<<< Updated upstream
=======
          export REACT_NATIVE_NODE_MODULES_DIR="$(pwd)/../node_modules"
>>>>>>> Stashed changes
          pod install
      - name: Build iOS App (No Codesign)
        run: |
          cd ios
          xcodebuild -workspace CouchPotatoPlayer.xcworkspace -scheme CouchPotatoPlayer -configuration Release -sdk iphonesimulator SYMROOT="${{ github.workspace }}/build/ios" CODE_SIGNING_ALLOWED="NO" CODE_SIGNING_REQUIRED="NO" CODE_SIGN_IDENTITY=""
      - name: Package iOS App
        run: tar -czf ios-build.tar.gz build/ios/Release-iphonesimulator/CouchPotatoPlayer.app
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build.tar.gz
          path: ios-build.tar.gz

  # ── tvOS Build (React Native Expo) ───────────────────────────────────────
  # We dynamically install react-native-tvos to generate the true tvOS targets
  # during prebuild, ensuring native compilation against the Apple TV SDK.
  build-tvos:
    runs-on: macos-15
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install
      - name: Inject react-native-tvos and config-tv
        run: |
          pnpm install react-native@npm:react-native-tvos@0.81.5-2
          pnpm install @react-native-tvos/config-tv --save-dev
          sed -i '' 's/"plugins": \[/"plugins": \[ \["@react-native-tvos\/config-tv", {"isTV": true, "showAndroidInTV": true, "showAndroidInMobile": true}\],/g' app.json || sed -i 's/"plugins": \[/"plugins": \[ \["@react-native-tvos\/config-tv", {"isTV": true, "showAndroidInTV": true, "showAndroidInMobile": true}\],/g' app.json
      - name: Prebuild iOS (Generates tvOS scheme)
        run: EXPO_TV=1 npx expo prebuild --platform ios
      - name: Pod Install
        run: |
          cd ios
          export REACT_NATIVE_NODE_MODULES_DIR="$(pwd)/../node_modules"
          pod install
      - name: Build tvOS App (No Codesign)
        run: |
          cd ios
          xcodebuild -workspace CouchPotatoPlayer.xcworkspace -scheme CouchPotatoPlayer -configuration Release -sdk appletvsimulator SYMROOT="${{ github.workspace }}/build/tvos" CODE_SIGNING_ALLOWED="NO" CODE_SIGNING_REQUIRED="NO" CODE_SIGN_IDENTITY=""
      - name: Package tvOS App
        run: tar -czf tvos-build.tar.gz build/tvos/Release-appletvsimulator/CouchPotatoPlayer.app
      - name: Upload tvOS Build
        uses: actions/upload-artifact@v4
        with:
          name: tvos-build.tar.gz
          path: tvos-build.tar.gz

  # ── Docker Build & Push (Web) ─────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Convert repository name to lowercase
        id: repo_name
        run: echo "REPO_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract branch name
        shell: bash
        run: |
          raw_branch="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          echo "branch=${raw_branch//\//-}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.REPO_NAME }}-web:${{ steps.extract_branch.outputs.branch }}
            ghcr.io/${{ env.REPO_NAME }}-web:latest
