name: Build Apps
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── Web Build ──────────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: TypeScript Check
        run: npx tsc --noEmit || true
      - name: Build Web Bundle
        run: npx webpack --mode production
      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: public/bundle.js

  # ── Android Build ──────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Generate Debug Keystore
        run: |
          mkdir -p android/app
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkey -v -keystore android/app/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
      - name: Build Android APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --max-workers=2 -Dorg.gradle.jvmargs="-Xmx4g"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-release.apk
          path: 'android/app/build/outputs/apk/release/*.apk'

  # ── iOS Build ──────────────────────────────────────────────
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Install CocoaPods Dependencies
        run: |
          cd ios
          bundle install 2>/dev/null || true
          pod install --repo-update || pod install
      - name: Build iOS App
        run: |
          mkdir -p ios/build/iOS
          # Try workspace first (created by pod install), fall back to xcodeproj
          if [ -d "ios/CouchPotatoPlayer.xcworkspace" ]; then
            xcodebuild -workspace ios/CouchPotatoPlayer.xcworkspace \
              -scheme CouchPotatoPlayer-iOS \
              -configuration Release \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -derivedDataPath ios/build/iOS \
              clean build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              | tail -50
          else
            xcodebuild -project ios/CouchPotatoPlayer.xcodeproj \
              -scheme CouchPotatoPlayer-iOS \
              -configuration Release \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -derivedDataPath ios/build/iOS \
              clean build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              | tail -50
          fi
      - name: Package iOS Build
        run: |
          cd ios/build/iOS/Build/Products/Release-iphoneos
          tar -czf ../../../../../ios-build.tar.gz CouchPotatoPlayer.app
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ios-build.tar.gz
          path: ios/ios-build.tar.gz

      - name: Build tvOS App
        run: |
          mkdir -p ios/build/tvOS
          # Try workspace first (created by pod install), fall back to xcodeproj
          if [ -d "ios/CouchPotatoPlayer.xcworkspace" ]; then
            xcodebuild -workspace ios/CouchPotatoPlayer.xcworkspace \
              -scheme CouchPotatoPlayer \
              -configuration Release \
              -sdk appletvos \
              -destination 'generic/platform=tvOS' \
              -derivedDataPath ios/build/tvOS \
              clean build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              | tail -50
          else
            xcodebuild -project ios/CouchPotatoPlayer.xcodeproj \
              -scheme CouchPotatoPlayer \
              -configuration Release \
              -sdk appletvos \
              -destination 'generic/platform=tvOS' \
              -derivedDataPath ios/build/tvOS \
              clean build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              | tail -50
          fi
      - name: Package tvOS Build
        run: |
          cd ios/build/tvOS/Build/Products/Release-appletvos
          tar -czf ../../../../../tvos-build.tar.gz CouchPotatoPlayer.app
      - name: Upload tvOS Build
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: tvos-build.tar.gz
          path: ios/tvos-build.tar.gz