name: Build Apps

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── Web Build (Flutter) ────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Dependencies
        working-directory: ./flutter_app
        run: flutter pub get
      - name: Build Web
        working-directory: ./flutter_app
        run: flutter build web --release
      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: flutter_app/build/web

  # ── Android Build (Flutter) ────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Dependencies
        working-directory: ./flutter_app
        run: flutter pub get
      - name: Build APK
        working-directory: ./flutter_app
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

  # ── iOS Build (Flutter) ────────────────────────────────────────
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Dependencies
        working-directory: ./flutter_app
        run: flutter pub get
      - name: Build iOS (No Codesign)
        working-directory: ./flutter_app
        run: flutter build ios --release --no-codesign
      - name: Package iOS App
        working-directory: ./flutter_app
        run: tar -czf ../ios-build.tar.gz build/ios/iphoneos/Runner.app
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build.tar.gz
          path: ios-build.tar.gz
