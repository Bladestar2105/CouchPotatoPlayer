name: Build Apps

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── Web Build (Flutter) ────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Dependencies
        run: flutter pub get
      - name: Build Web
        run: flutter build web --release
      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  # ── Docker Build (Flutter Web) ─────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web
      - name: Build Docker Image
        run: docker build -t couchpotatoplayer-web .
      - name: Save Docker Image
        run: docker save couchpotatoplayer-web > couchpotatoplayer-web.tar
      - name: Upload Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: couchpotatoplayer-web-docker
          path: couchpotatoplayer-web.tar

  # ── Android Build (Flutter) ────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ── iOS Build (Flutter) ────────────────────────────────────────
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Dependencies
        run: flutter pub get
      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign
      - name: Package iOS App
        run: tar -czf ios-build.tar.gz build/ios/iphoneos/Runner.app
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build.tar.gz
          path: ios-build.tar.gz

  # ── tvOS Build (Flutter) ───────────────────────────────────────
  build-tvos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.1'
      - name: Download Custom Engine
        run: |
          mkdir -p out
          curl -L -o out/host_release_arm64.zip https://oc.bw.tech/s/utLzZGcszpqvX5a/download
          curl -L -o out/ios_release.zip https://oc.bw.tech/s/x0K4EbOJfTp9VJI/download
          unzip -q out/host_release_arm64.zip -d out/
          unzip -q out/ios_release.zip -d out/
      - name: Prepare iOS build
        run: |
          flutter pub get
          flutter build ios --config-only
      - name: Switch Target to tvOS
        run: sh scripts/switch_target.sh tvos
      - name: Build tvOS App (No Codesign)
        run: |
          cd ios
          pod install
          sh ../scripts/copy_framework.sh release "${{ github.workspace }}"
          sed -i "" "s#FLUTTER_LOCAL_ENGINE[[:space:]]=[[:space:]].*;#FLUTTER_LOCAL_ENGINE = \"${{ github.workspace }}\";#g" Runner.xcodeproj/project.pbxproj
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -destination 'generic/platform=tvOS' -allowProvisioningUpdates CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
        env:
          FLUTTER_LOCAL_ENGINE: ${{ github.workspace }}
      - name: Package tvOS App
        run: tar -czf tvos-build.tar.gz build/ios/Release-appletvos/Runner.app
      - name: Upload tvOS Build
        uses: actions/upload-artifact@v4
        with:
          name: tvos-build.tar.gz
          path: tvos-build.tar.gz
