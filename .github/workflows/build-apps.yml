name: Build Apps
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build Android APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: '**/*.apk'

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Install CocoaPods
        run: cd ios && pod install
      - name: Build iOS App
        run: |
          xcodebuild -workspace ios/CouchPotatoPlayer.xcworkspace -scheme CouchPotatoPlayer -configuration Release -sdk iphoneos clean archive -archivePath CouchPotatoPlayer.xcarchive CODE_SIGNING_ALLOWED=NO || xcodebuild -project ios/CouchPotatoPlayer.xcodeproj -scheme CouchPotatoPlayer -configuration Release -sdk iphoneos clean archive -archivePath CouchPotatoPlayer.xcarchive CODE_SIGNING_ALLOWED=NO
      - name: Upload iOS Archive
        uses: actions/upload-artifact@v4
        with:
          name: CouchPotatoPlayer.xcarchive
          path: CouchPotatoPlayer.xcarchive