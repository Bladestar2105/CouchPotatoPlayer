name: Build Apps

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── Android Build (React Native Expo) ────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Prebuild Android
        run: npx expo prebuild --platform android
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

  # ── iOS Build (React Native Expo) ────────────────────────────────────────
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Prebuild iOS
        run: npx expo prebuild --platform ios
      - name: Pod Install
        run: |
          cd ios
          pod install
      - name: Build iOS App (No Codesign)
        run: |
          cd ios
          xcodebuild -workspace CouchPotatoPlayer.xcworkspace -scheme CouchPotatoPlayer -configuration Release -destination 'generic/platform=iOS Simulator' SYMROOT="${{ github.workspace }}/build/ios" CODE_SIGNING_ALLOWED="NO" CODE_SIGNING_REQUIRED="NO" CODE_SIGN_IDENTITY=""
      - name: Package iOS App
        run: tar -czf ios-build.tar.gz build/ios/Release-iphonesimulator/CouchPotatoPlayer.app
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build.tar.gz
          path: ios-build.tar.gz

  # ── tvOS Build (React Native Expo) ───────────────────────────────────────
  # Note: Standard Expo usually does not fully support Apple TV out of the box without
  # react-native-tvos, but we compile what we have for tvOS simulation.
  build-tvos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: Prebuild iOS (tvOS)
        run: npx expo prebuild --platform ios
      - name: Pod Install
        run: |
          cd ios
          pod install
      - name: Build tvOS App (No Codesign)
        run: |
          cd ios
          xcodebuild -workspace CouchPotatoPlayer.xcworkspace -scheme CouchPotatoPlayer -configuration Release -destination 'generic/platform=tvOS Simulator' SYMROOT="${{ github.workspace }}/build/tvos" CODE_SIGNING_ALLOWED="NO" CODE_SIGNING_REQUIRED="NO" CODE_SIGN_IDENTITY=""
      - name: Package tvOS App
        run: tar -czf tvos-build.tar.gz build/tvos/Release-appletvsimulator/CouchPotatoPlayer.app
      - name: Upload tvOS Build
        uses: actions/upload-artifact@v4
        with:
          name: tvos-build.tar.gz
          path: tvos-build.tar.gz

  # ── Docker Build & Push (Web) ─────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Convert repository name to lowercase
        id: repo_name
        run: echo "REPO_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ env.REPO_NAME }}-web:latest
