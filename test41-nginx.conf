events {}
http {
    error_log /app/error.log debug;
    server {
        listen 80;

        # Test rewriting the exact config in the normal block from test2
        location /proxy/ {
            resolver 8.8.8.8 8.8.4.4 valid=300s;
            resolver_timeout 5s;

            set $target_url "";
            if ($request_uri ~* "^/proxy/(.*)$") {
                set $target_url $1;
            }
            if ($target_url = "") { return 400 "Missing target URL"; }

            # Since $target_url has the URI, let's look at the variable again.
            # "https://stream.team-ei.de/test"
            # It's definitely "https://stream.team-ei.de/test"
            # And Nginx sends "/proxy/https:/stream.team-ei.de/test"
            # Wait, Nginx says "http upstream request: "/proxy/https:/stream.team-ei.de/test?""
            # Notice the single slash after `https:`! "https:/"!
            # The variable `$target_url` might ACTUALLY be `https:/stream.team-ei.de/test` because $request_uri collapsed the slashes BEFORE we matched it!
            # BUT `$request_uri` DOES NOT collapse slashes! Only `$uri` does!
            # Let's verify if `$target_url` has double slashes!
        }
    }
}
